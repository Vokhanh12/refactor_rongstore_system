syntax = "proto3";

package iam.v1;

option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/iam/v1/resources;resourcespb";
option java_package = "com.aliasadi.iam.v1.resources";
option java_multiple_files = true;

import "validate/v1/validate.proto";
import "common/v1/base_request.proto";
import "common/v1/auth_options.proto";
import "google/protobuf/timestamp.proto";


// ============================================================
// ENTITY
// ============================================================

message StoreOwner {

  string id = 1;              
  
  double lat = 2;              
  double lng = 3;       

  int32 tile_x = 4;    
  int32 tile_y = 5;            

  string create_by = 14;
  string update_by = 15;

  google.protobuf.Timestamp create_date = 16;
  google.protobuf.Timestamp update_date = 17;
}


// ============================================================
// MUTATION (CQRS COMMAND)
// ============================================================

message StoreOwnerMutation {

  string op_id = 1 [
    (validate.rules).string = {min_len: 1}
  ];

  oneof action {
    option (validate.required) = true;

    Create create = 2;
    Update update = 3;
    UpdateAvatar update_avatar = 4;
    Delete delete = 5;
  }

  // ---------------- CREATE ----------------
  message Create {

    option (auth.resource) = "STORE_OWNER";
    option (auth.action) = "CREATE";
    option (auth.require_tenant) = true;

    double lat = 1;
    double lng = 2;
    int32 tile_x = 3;
    int32 tile_y = 4;

    message Data {
      string resource_id = 1;
    }
  }


  // ---------------- UPDATE ----------------
  message Update {

    option (auth.resource) = "STORE_OWNER";
    option (auth.action) = "UPDATE";
    option (auth.resource_id_field) = "id";
    option (auth.require_tenant) = true;

    string id = 1 [
      (validate.rules).string = {min_len: 1}
    ];

    double lat = 2;
    double lng = 3;
    int32 tile_x = 4;
    int32 tile_y = 5;

    message Data {}
  }


  // ---------------- UPDATE AVATAR ----------------
  message UpdateAvatar {

    option (auth.resource) = "STORE_OWNER";
    option (auth.action) = "UPDATE_AVATAR";
    option (auth.resource_id_field) = "owner_id";
    option (auth.require_tenant) = true;

    string owner_id = 1 [
      (validate.rules).string = {min_len: 1}
    ];

    bytes data = 2 [
      (validate.rules).bytes = {min_len: 1}
    ];

    string content_type = 3 [
      (validate.rules).string = {min_len: 1}
    ];

    string filename = 4;

    message Data {
      string avatar_url = 1;
    }
  }


  // ---------------- DELETE ----------------
  message Delete {

    option (auth.resource) = "STORE_OWNER";
    option (auth.action) = "DELETE";
    option (auth.resource_id_field) = "id";
    option (auth.require_tenant) = true;

    string id = 1 [
      (validate.rules).string = {min_len: 1}
    ];

    message Data {}
  }
}


message StoreOwnerMutateRequest {
  repeated StoreOwnerMutation mutations = 1 [
    (validate.rules).repeated = {min_items: 1}
  ];
}


// ============================================================
// QUERY (CQRS VIEW)
// ============================================================

message StoreOwnerView {

  string op_id = 1 [
    (validate.rules).string = {min_len: 1}
  ];

  oneof action {
    option (validate.required) = true;

    Search search = 2;
    SearchByTiles search_by_tiles = 3;
  }


  // ---------------- SEARCH ----------------
  message Search {

    option (auth.resource) = "STORE_OWNER";
    option (auth.action) = "READ";
    option (auth.require_tenant) = true;

    common.v1.SearchRequest common = 1 [
      (validate.rules).message = {required: true}
    ];

    message Data {
      repeated StoreOwner results = 1;
      int64 total = 2;
    }
  }


  // ---------------- SEARCH BY TILES ----------------
  message SearchByTiles {

    option (auth.resource) = "STORE_OWNER";
    option (auth.action) = "READ";
    option (auth.require_tenant) = true;

    int32 zoom = 1;

    TileRange tile_range = 2 [
      (validate.rules).message = {required: true}
    ];

    message TileRange {
      int32 min_x = 1;
      int32 max_x = 2;
      int32 min_y = 3;
      int32 max_y = 4;
    }

    message Data {
      repeated StoreOwner results = 1;
      int64 total = 2;
    }
  }
}


message StoreOwnerViewRequest {
  repeated StoreOwnerView views = 1 [
    (validate.rules).repeated = {min_items: 1}
  ];
}
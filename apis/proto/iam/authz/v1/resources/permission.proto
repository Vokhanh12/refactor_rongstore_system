syntax = "proto3";

package iam.v1;

option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/iam/v1/resources;resourcespb";
option java_package = "com.aliasadi.iam.v1.resources";
option java_multiple_files = true;

import "validate/v1/validate.proto";
import "common/v1/base_request.proto";
import "common/v1/auth_options.proto";
import "google/protobuf/timestamp.proto";

// ============================================================
// ENTITY
// ============================================================

message Permission {
  string id = 1;
  string code = 2;

  string name = 3;
  string description = 4;

  string resource = 5;
  string action = 6;

  bool is_active = 7;

  string create_by = 12;
  string update_by = 13;

  google.protobuf.Timestamp create_date = 14;
  google.protobuf.Timestamp update_date = 15;
}

// ============================================================
// MUTATION (COMMAND)
// ============================================================

message PermissionMutation {

    string op_id = 1 [
      (validate.rules).string = {min_len: 1}
    ];
  
    oneof action {
      // ⚠️ PGV không support required cho oneof → validate ở code
      Create create = 2;
      Update update = 3;
      Delete delete = 4;
    }
  
    // ---------------- CREATE ----------------
    message Create {
  
      option (auth.resource) = "PERMISSION";
      option (auth.action) = "CREATE";
      option (auth.require_tenant) = true;
  
      message Data {
        string code = 1 [(validate.rules).string = {min_len: 1}];
        string name = 2 [(validate.rules).string = {min_len: 1}];
        string description = 3;
      }
  
      Data data = 1 [(validate.rules).message.required = true];
    }
  
    // ---------------- UPDATE ----------------
    message Update {
  
      option (auth.resource) = "PERMISSION";
      option (auth.action) = "UPDATE";
      option (auth.resource_id_field) = "id";
      option (auth.require_tenant) = true;
  
      string id = 1 [
        (validate.rules).string = {min_len: 1}
      ];
  
      message Data {
        string name = 1;
        string description = 2;
      }
  
      Data data = 2 [(validate.rules).message.required = true];
    }
  
    // ---------------- DELETE ----------------
    message Delete {
  
      option (auth.resource) = "PERMISSION";
      option (auth.action) = "DELETE";
      option (auth.resource_id_field) = "id";
      option (auth.require_tenant) = true;
  
      string id = 1 [
        (validate.rules).string = {min_len: 1}
      ];
    }
  }


// ============================================================
// QUERY (VIEW) (COMMAND)
// ============================================================


// ============================================================
// API
// ============================================================

message PermissionMutateRequest {
  repeated PermissionMutation mutations = 1 [
    (validate.rules).repeated = {min_items: 1}
  ];
}

message PermissionViewRequest {}
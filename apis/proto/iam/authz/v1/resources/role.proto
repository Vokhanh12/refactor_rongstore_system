syntax = "proto3";

package iam.v1;

option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/iam/v1/resources;resourcespb";

import "validate/v1/validate.proto";
import "google/protobuf/timestamp.proto";
import "core/common/v1/resources/auth_options.proto";
import "iam/authz/v1/resources/common.proto";

// ============================================================
// READ MODEL (QUERY SIDE)
// ============================================================

message Role {
  string id = 1;
  string code = 2;
  string scope_id = 3;

  string name = 4;
  string scope_type = 5;
  string access_scope = 6;

  int32 level = 7;
  string description = 8;

  bool is_system = 9;
  bool is_super = 10;
  bool is_active = 11;

  string created_by = 12;
  string updated_by = 13;

  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

// ============================================================
// MUTATION API (WRITE SIDE)
// ============================================================

message RoleMutation {
  string op_id = 1 [
    (validate.rules).string = {min_len: 1}
  ];

  oneof action {
    option (validate.required) = true;
    Create create = 2;
    Update update = 3;
    Delete delete = 4;
  }
}

message RoleMutateRequest {
  repeated RoleMutation mutations = 1 [
    (validate.rules).repeated = {min_items: 1}
  ];
}

// ---------------- CREATE ----------------

message Create {

  option (auth.resource) = "ROLE";
  option (auth.action) = "CREATE";

  message Data {
    string code = 1 [(validate.rules).string = {min_len: 1}];
    string name = 2 [(validate.rules).string = {min_len: 1}];
    string description = 3;

    string scope_id = 4;
    string scope_type = 5;
    string access_scope = 6;

    int32 level = 7;
    bool is_system = 8;
    bool is_super = 9;
    bool is_active = 10;
  }

  Data data = 1 [(validate.rules).message.required = true];
}

// ---------------- UPDATE ----------------

message Update {

  option (auth.resource) = "ROLE";
  option (auth.action) = "UPDATE";
  option (auth.resource_id_field) = "id";

  string id = 1 [
    (validate.rules).string = {min_len: 1}
  ];

  message Data {
    string code = 1 [(validate.rules).string = {min_len: 1}];
    string name = 2 [(validate.rules).string = {min_len: 1}];
    string description = 3;

    string scope_id = 4;
    string scope_type = 5;
    string access_scope = 6;

    int32 level = 7;
    bool is_system = 8;
    bool is_super = 9;
    bool is_active = 10;
  }

  Data data = 2 [(validate.rules).message.required = true];
}

// ---------------- DELETE ----------------

message Delete {

  option (auth.resource) = "ROLE";
  option (auth.action) = "DELETE";
  option (auth.resource_id_field) = "id";

  string id = 1 [
    (validate.rules).string = {min_len: 1}
  ];
}

// ============================================================
// MUTATION RESULT (WRITE RESPONSE)
// ============================================================

message CreateResult {
  RoleResult roleResult = 1;
}

message UpdateResult {
  RoleResult roleResult = 1;
}

message DeleteResult {}

// ============================================================
// QUERY SIDE
// ============================================================

message RoleView {

  string op_id = 1;

  oneof action {
    Get get = 2;
    List list = 3;
    Search search = 4;
  }

  message Get {
    string id = 1;
  }

  message List {
    int32 limit = 1;
    int32 offset = 2;
  }

  message Search {
    string keyword = 1;
  }
}



// VIEW RESULT (WRITE RESPONSE)
// ============================================================

message GetResult {
  string id = 1;
}

message ListResult {}

message SearchResult {}
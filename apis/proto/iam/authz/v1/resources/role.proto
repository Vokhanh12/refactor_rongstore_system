syntax = "proto3";

package iam.v1;

option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/iam/v1/resources;resourcespb";
option java_package = "com.aliasadi.iam.v1.resources";
option java_multiple_files = true;

import "validate/v1/validate.proto";
import "core/common/v1/resources/base_request.proto";
import "core/common/v1/resources/auth_options.proto";
import "google/protobuf/timestamp.proto";

// ============================================================
// ENTITY
// ============================================================

message Role {
  string id = 1;
  string code = 2;
  string scope_id = 3;

  string name = 4;

  string scope_type = 5;
  string access_scope = 6;

  int32 level = 7;
  string description = 8;

  bool is_system = 9;
  bool is_super = 10;
  bool is_active = 11;

  string create_by = 12;
  string update_by = 13;

  google.protobuf.Timestamp create_date = 14;
  google.protobuf.Timestamp update_date = 15;
}

// ============================================================
// MUTATION (COMMAND)
// ============================================================

message RoleMutation {

    string op_id = 1 [
      (validate.rules).string = {min_len: 1}
    ];
  
    oneof action {
      option (validate.required) = true;
  
      Create create = 2;
      Update update = 3;
      Delete delete = 4;
    }
  
    // ---------------- CREATE ----------------
    message Create {
  
      option (auth.resource) = "ROLE";
      option (auth.action) = "CREATE";
      option (auth.require_tenant) = true;
  
      message Data {
        string code = 1;
        string name = 2;
        string description = 3;
      }
  
      Data data = 1 [(validate.rules).message.required = true];;
    }
  
    // ---------------- UPDATE ----------------
    message Update {
  
      option (auth.resource) = "ROLE";
      option (auth.action) = "UPDATE";
      option (auth.resource_id_field) = "id";
      option (auth.require_tenant) = true;
  
      string id = 1 [
        (validate.rules).string = {min_len: 1}
      ];
  
      message Data {
        string name = 1;
        string description = 2;
      }
  
      Data data = 2 [(validate.rules).message.required = true];;
    }
  
    // ---------------- DELETE ----------------
    message Delete {
  
      option (auth.resource) = "ROLE";
      option (auth.action) = "DELETE";
      option (auth.resource_id_field) = "id";
      option (auth.require_tenant) = true;
  
      string id = 1 [
        (validate.rules).string = {min_len: 1}
      ];
    }
  }

// ============================================================
// QUERY (VIEW)
// ============================================================



// ============================================================
// API
// ============================================================

message RoleMutateRequest {
  repeated RoleMutation mutations = 1 [
    (validate.rules).repeated = {min_items: 1}
  ];
}


message RoleView {

  string op_id = 1;

  oneof action {
    option (validate.required) = true;

    Get get = 2;
    List list = 3;
    Search search = 4;
  }

  message Get {}

  message List {}

  message Search {}
}
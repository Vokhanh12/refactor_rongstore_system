syntax = "proto3";
package common.v1;
option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/core/common/v1;commonv1";

import "google/protobuf/any.proto";
import "core/common/v1/resources/metadata.proto";
import "core/common/v1/resources/error.proto";
import "core/common/v1/resources/pagination.proto";
import "core/common/v1/resources/warning.proto";
import "core/common/v1/resources/mutate_result.proto";
import "core/common/v1/resources/view_result.proto";

message BaseResponse {
  bool success = 1;
  google.protobuf.Any data = 2;   
  Metadata metadata = 3;         
  Error error = 4;               
  Pagination pagination = 5;     
  repeated Warning warnings = 6; 
  map<string, string> details = 7; 
}

message MutateResponse {
  Metadata metadata = 1;
  MutateResult mutate_results = 2;
}

message ViewResponse {
  Metadata metadata = 1;
  ViewResult view_results = 2;
}


syntax = "proto3";

package common.v1;

option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/core/common/v1;commonv1";

message ErrorDetail {
  string field = 1;
  string message = 2;
  string code = 3;
  string hint = 4;
}

message ExternalError {
  string code = 1;
  string message = 2;
  repeated ErrorDetail details = 3;
}

message InternalError {
  string key = 1;
  string severity = 2;
  bool retryable = 3;
  string source = 4;
  string grpc_code = 5;
  string client_action = 6;
  string server_action = 7;
}

message Error {
  ExternalError external = 1;
  InternalError internal = 2;
}
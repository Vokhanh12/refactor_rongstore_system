syntax = "proto3";
package common.v1;
option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/core/common/v1;commonv1";

import "validate/v1/validate.proto";

message Pagination {
  int32 limit = 1 [(validate.rules).int32 = {gt: 0}]; 
  int32 offset = 2 [(validate.rules).int32 = {gte: 0}];
}

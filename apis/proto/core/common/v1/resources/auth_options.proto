syntax = "proto3";

package auth;

option go_package = "github.com/vokhanh12/refactor-rongstore-system/server/gen/proto/common/v1;commonv1";

import "google/protobuf/descriptor.proto";

extend google.protobuf.MessageOptions {
  string resource = 50001;
  string action = 50002;
  string resource_id_field = 50003;
  bool check_ownership = 50004;
  bool require_tenant = 50005;
  bool skip_auth = 50006;
  string required_permission = 50007;
}
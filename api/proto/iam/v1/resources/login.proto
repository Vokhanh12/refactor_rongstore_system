syntax = "proto3";

package iam.v1;
option go_package = "api/iam/v1/resources;resourcespb"; 
option java_package = "com.aliasadi.iam.v1.resources";
option java_multiple_files = true;

message LoginRequest {
    string email = 1; 
    string password = 2;
  }
  
  message LoginResponse {
    string access_token = 2;
    string refresh_token = 3;
  }
  
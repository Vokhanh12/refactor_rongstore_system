syntax = "proto3";

package iam.v1;
option go_package = "api/iam/v1/services;servicespb";
option java_package = "com.aliasadi.iam.v1.services";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "common/v1/base_response.proto";
import "iam/v1/resources/store_owner.proto";
import "iam/v1/resources/login.proto";
import "iam/v1/resources/handshake.proto";


service IamService {
    rpc Login(LoginRequest) returns (common.v1.BaseResponse) {
      option (google.api.http) = {
        post: "/v1/login"
        body: "*"
      };
    }
  
    rpc Handshake(HandshakeRequest) returns (common.v1.BaseResponse) {
      option (google.api.http) = {
        post: "/v1/handshake"
        body: "*"
      };
    }

    rpc StoreOwnerMutate(StoreOwnerMutateRequest) returns (common.v1.MutateResponse){
        option (google.api.http) = {
            post: "/v1/store-owners:mutate"
            body: "*"
          };
    };

    rpc StoreOwnerView(StoreOwnerViewRequest) returns (common.v1.ViewResponse){
        option (google.api.http) = {
            post: "/v1/store-owners:view"
            body: "*"
          };
    };

  }


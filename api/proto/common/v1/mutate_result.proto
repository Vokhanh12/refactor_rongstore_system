syntax = "proto3";

package common.v1;
option go_package = "api/common/v1;commonv1"; 

import "common/v1/mutate_operation.proto";
import "common/v1/error.proto";
import "google/protobuf/any.proto";

message MutateResult {
  string op_id = 1;
  google.protobuf.Any data = 2;
  bool success = 3;
  MutateOperation.MutateOperationEnum mutate_operation = 4;
  Error error = 5;               
}

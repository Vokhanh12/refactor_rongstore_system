version: "2"

sql:
  # ===== IAM =====
  - engine: postgresql
    schema:
      - sql/iam/auth/schema
      - sql/iam/authz/schema
    queries:
      - sql/iam/auth/queries
      - sql/iam/authz/queries
    gen:
      go:
        package: iam_sqlc               
        out: server/internal/platform/db/sqlc  
        sql_package: "pgx/v5"     
        emit_interface: true           
        emit_json_tags: true      
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
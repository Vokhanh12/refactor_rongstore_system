version: "2"

sql:
  - engine: postgresql

    schema:
      - sql/iam/authz/schema

    queries:
      - sql/iam/authz/queries

    gen:
      go:
        package: iam_sqlc
        out: server/internal/platform/db/sqlc

        sql_package: "pgx/v5"

        emit_interface: true
        emit_json_tags: true

        overrides:

          #
          # UUID
          #

          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true

          #
          # nullable UUID -> *uuid.UUID
          #

          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true

          #
          # TIMESTAMPTZ
          #

          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          #
          # nullable text -> *string
          #

          - db_type: "pg_catalog.text"
            nullable: true
            go_type:
              type: "string"
              pointer: true

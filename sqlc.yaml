version: "2"

sql:
  # ===== IAM =====
  - engine: postgresql
    schema:
      - sql/iam/auth/schema
      - sql/iam/authz/schema
    queries:
      - sql/iam/auth/queries
      - sql/iam/authz/queries
    gen:
      go:
        package: iam_sqlc               # package tên go
        out: server/internal/platform/db/sqlc  # đường dẫn generate code
        sql_package: "database/sql"     # sql package chuẩn
        emit_interface: true            # tạo interface
        emit_json_tags: true            # emit json tags cho struct
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
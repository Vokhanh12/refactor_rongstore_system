version: 1
updated_at: "2025-08-17"
owner: platform-auth

# ============================================================
# GLOBAL CONVENTIONS
# ============================================================

conventions:
  code_format: "<DOMAIN>-<CATEGORY>-<NNN>"

  severity_scale:
    S1: "Critical outage / security risk"
    S2: "Degraded experience / important failure"
    S3: "Client error / minor issue"

  retry_policy:
    http_retryable: [408, 429, 500, 502, 503, 504]
    grpc_retryable: ["Unavailable", "DeadlineExceeded"]

# ============================================================
# CORE (GENERIC / SHARED ENGINE)
# ============================================================

services:
  core:
    domain: "CORE"
    errors:
      MUT:
        - code: CORE-MUT-001
          key: MUTATE_OPERATION_UNSUPPORTED
          component: mutate_engine
          tags: [validation, client]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Unsupported mutate operation"
          severity: S3
          retryable: false

        - code: CORE-MUT-002
          key: MUTATE_PARTIAL_FAILURE
          component: mutate_engine
          tags: [system]
          http_status: 200
          grpc_code: OK
          message: "One or more operations failed"
          severity: S2
          retryable: false

      VIE:
        - code: CORE-VIE-001
          key: VIEW_OPERATION_UNSUPPORTED
          component: view_engine
          tags: [validation, client]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Unsupported view operation"
          severity: S3
          retryable: false

        - code: CORE-VIE-002
          key: VIEW_PARTIAL_FAILURE
          component: mutate_engine
          tags: [system]
          http_status: 200
          grpc_code: OK
          message: "One or more operations failed"
          severity: S2
          retryable: false

      VAL:
        - code: CORE-VAL-001
          key: VALIDATION_FAILED
          component: validator
          tags: [system]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Validation failed"
          severity: S3
          retryable: false        

      INFRA:
        - code: CORE-INF-001
          key: JSON_SERIALIZATION_FAILED
          component: api_gateway
          tags: [infra]
          http_status: 500
          grpc_code: Internal
          message: "Failed to serialize request payload"
          severity: S2
          retryable: false

# ============================================================
# IAM - AUTH (AUTHENTICATION)
# ============================================================
  iam:
    auth:
      domain: "AUTH"

      errors:

        VAL:
          - code: AUTH-VAL-001
            key: LOGIN_EMAIL_EMPTY
            component: validator
            tags: [validation, client]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Email is required"
            severity: S3
            retryable: false

          - code: AUTH-VAL-002
            key: LOGIN_EMAIL_INVALID
            component: validator
            tags: [validation, client]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Invalid email format"
            severity: S3
            retryable: false

          - code: AUTH-VAL-003
            key: LOGIN_PASSWORD_EMPTY
            component: validator
            tags: [validation, client]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Password is required"
            severity: S3
            retryable: false

          - code: AUTH-VAL-004
            key: LOGIN_PAYLOAD_INVALID
            component: validator
            tags: [validation, client]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Invalid request payload"
            severity: S3
            retryable: false

        SEC:
          - code: AUTH-SEC-001
            key: TOKEN_EXPIRED
            component: jwt
            tags: [security, auth]
            http_status: 401
            grpc_code: Unauthenticated
            message: "Token expired"
            severity: S3
            retryable: false

          - code: AUTH-SEC-002
            key: UNAUTHORIZED
            component: auth_service
            tags: [security, auth]
            http_status: 401
            grpc_code: Unauthenticated
            message: "Authentication required"
            severity: S3
            retryable: false

  # ============================================================
  # IAM - AUTHZ (AUTHORIZATION)
  # ============================================================

    authz:
      domain: "AUTHZ"

      errors:

        VAL:
          - code: AUTHZ-VAL-001
            key: AUTHORIZATION_INVALID
            component: authz_service
            tags: [validation, authz]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Invalid authorization"
            severity: S3
            retryable: false

          - code: AUTHZ-VAL-002
            key: RESOURCE_OR_ACTION_REQUIRED
            component: authz_service
            tags: [validation, authz]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Resource and action are required"
            severity: S3
            retryable: false

          - code: AUTHZ-VAL-003
            key: ROLE_REQUIRED
            component: authz_service
            tags: [validation, authz]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Role is required"
            severity: S3
            retryable: false

        DOM:
          - code: AUTHZ-DOM-001
            key: ROLE_NOT_FOUND
            component: role_service
            tags: [domain]
            http_status: 404
            grpc_code: NotFound
            message: "Role not found"
            severity: S3
            retryable: false

          - code: AUTHZ-DOM-002
            key: ROLE_CONFLICT
            component: role_service
            tags: [domain]
            http_status: 409
            grpc_code: AlreadyExists
            message: "Role already exists"
            severity: S3
            retryable: false

          - code: AUTHZ-DOM-003
            key: ROLE_INVALID
            component: role_service
            tags: [domain]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Role contains invalid references"
            severity: S3
            retryable: false

          - code: AUTHZ-DOM-004
            key: ROLE_PERSIST_FAILED
            component: role_repository
            tags: [domain]
            http_status: 500
            grpc_code: Internal
            message: "Failed to persist role"
            severity: S2
            retryable: false

        SEC:
          - code: AUTHZ-SEC-001
            key: ROLE_FORBIDDEN
            component: authz_service
            tags: [security, authz]
            http_status: 403
            grpc_code: PermissionDenied
            message: "Permission denied"
            severity: S3
            retryable: false

  # ============================================================
  # INFRASTRUCTURE (SHARED)
  # ============================================================

  platform:
    domain: "PLATFORM"

    errors:

      INFRA:
        - code: PLATFORM-INF-001
          key: DB_TIMEOUT
          component: postgres
          tags: [infra, database]
          http_status: 503
          grpc_code: Unavailable
          message: "Database timeout"
          severity: S1
          retryable: true

        - code: PLATFORM-INF-002
          key: DB_QUERY_FAILED
          component: postgres
          tags: [infra, database]
          http_status: 500
          grpc_code: Internal
          message: "Database query failed"
          severity: S2
          retryable: false

        - code: PLATFORM-INF-003
          key: REDIS_UNAVAILABLE
          component: redis
          tags: [infra, cache]
          http_status: 503
          grpc_code: Unavailable
          message: "Redis unavailable"
          severity: S1
          retryable: true

        - code: PLATFORM-INF-004
          key: EXTERNAL_SERVICE_UNAVAILABLE
          component: external_service
          tags: [infra, external]
          http_status: 503
          grpc_code: Unavailable
          message: "External service unavailable"
          severity: S1
          retryable: true

# ============================================================
# ERROR DETAILS (VALIDATION LEVEL)
# ============================================================

error_details:

  # ========================
  # REQUIRED / NULL
  # ========================
  - code: VAL_REQUIRED
    message: "Field is required"

  - code: VAL_NULL
    message: "Field must not be null"

  # ========================
  # FORMAT / TYPE
  # ========================
  - code: VAL_INVALID_FORMAT
    message: "Invalid format"

  - code: VAL_INVALID_TYPE
    message: "Invalid data type"

  - code: VAL_INVALID_ENUM
    message: "Invalid enum value"

  # ========================
  # RANGE / SIZE
  # ========================
  - code: VAL_OUT_OF_RANGE
    message: "Out of range"

  - code: VAL_TOO_SHORT
    message: "Value is too short"

  - code: VAL_TOO_LONG
    message: "Value is too long"

  - code: VAL_MIN
    message: "Value is below minimum"

  - code: VAL_MAX
    message: "Value exceeds maximum"

  # ========================
  # STRING / PATTERN
  # ========================
  - code: VAL_INVALID_PATTERN
    message: "Value does not match required pattern"

  # ========================
  # BUSINESS LOGIC
  # ========================
  - code: VAL_DUPLICATE
    message: "Duplicate value"

  - code: VAL_CONFLICT
    message: "Value conflicts with existing data"

  - code: VAL_NOT_ALLOWED
    message: "Operation not allowed"

  - code: VAL_FORBIDDEN_STATE
    message: "Invalid state for operation"

  # ========================
  # EXISTENCE
  # ========================
  - code: VAL_NOT_FOUND
    message: "Not found"

  - code: VAL_ALREADY_EXISTS
    message: "Already exists"

  # ========================
  # RELATION / REFERENCE
  # ========================
  - code: VAL_INVALID_REFERENCE
    message: "Invalid reference"

  - code: VAL_DEPENDENCY_MISSING
    message: "Required dependency is missing"

  # ========================
  # TIME / DATE
  # ========================
  - code: VAL_INVALID_TIME_RANGE
    message: "Invalid time range"

  - code: VAL_EXPIRED
    message: "Value has expired"

  # ========================
  # SECURITY / INPUT
  # ========================
  - code: VAL_UNSAFE_INPUT
    message: "Unsafe input detected"

  # ========================
  # GENERIC FALLBACK
  # ========================
  - code: VAL_INVALID
    message: "Invalid value"
# ============================================================
# DEFAULTS / FALLBACK
# ============================================================

defaults:
  UNKNOWN_DOMAIN:
    code: CORE-VAL-999
    http_status: 400
    grpc_code: InvalidArgument
    message: "Unknown domain error"

  INTERNAL_FALLBACK:
    code: CORE-INF-000
    http_status: 500
    grpc_code: Internal
    message: "Internal server error"
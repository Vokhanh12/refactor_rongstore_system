version: 2
updated_at: "2026-05-16"
owner: platform-auth

# ============================================================
# GLOBAL CONVENTIONS
# ============================================================

conventions:

  code_format: "<DOMAIN>-<LAYER>-<NNN>"

  layers:

    DOM: "Business invariant / domain rule"
    APP: "Usecase orchestration / workflow"
    TRANS: "Transport / DTO / request"
    PARSE: "Technical parsing / conversion"
    INFRA: "Infrastructure / external system"
    SEC: "Authentication / authorization"
    SYS: "Unexpected / fallback"

  severity_scale:

    S1: "Critical outage / security risk"
    S2: "Degraded experience / important failure"
    S3: "Client error / invalid input"

  retry_policy:

    http_retryable:
      - 408
      - 429
      - 500
      - 502
      - 503
      - 504

    grpc_retryable:
      - "Unavailable"
      - "DeadlineExceeded"

# ============================================================
# SERVICES
# ============================================================

services:

  # ==========================================================
  # CORE
  # ==========================================================

  core:

    domain: "CORE"

    errors:

      DOM:

        - code: CORE-DOM-001
          key: VALIDATION_FAILED
          component: validator
          tags: [domain, validation]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Validation failed"
          severity: S3
          retryable: false

      APP:

        - code: CORE-APP-001
          key: MUTATE_OPERATION_UNSUPPORTED
          component: mutate_engine
          tags: [application]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Unsupported mutate operation"
          severity: S3
          retryable: false

        - code: CORE-APP-002
          key: MUTATE_PARTIAL_FAILURE
          component: mutate_engine
          tags: [application]
          http_status: 200
          grpc_code: OK
          message: "One or more operations failed"
          severity: S2
          retryable: false

        - code: CORE-APP-003
          key: VIEW_OPERATION_UNSUPPORTED
          component: view_engine
          tags: [application]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Unsupported view operation"
          severity: S3
          retryable: false

        - code: CORE-APP-004
          key: VIEW_PARTIAL_FAILURE
          component: view_engine
          tags: [application]
          http_status: 200
          grpc_code: OK
          message: "One or more operations failed"
          severity: S2
          retryable: false

      TRANS:

        - code: CORE-TRANS-001
          key: INVALID_REQUEST_PAYLOAD
          component: transport
          tags: [transport]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Invalid request payload"
          severity: S3
          retryable: false

      PARSE:

        - code: CORE-PARSE-001
          key: STRING_SPLIT_INVALID
          component: parser
          tags: [parser]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Invalid string format"
          severity: S3
          retryable: false

        - code: CORE-PARSE-002
          key: UUID_INVALID
          component: parser
          tags: [parser]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Invalid UUID format"
          severity: S3
          retryable: false

        - code: CORE-PARSE-003
          key: MUTATE_PARSE_FAILED
          component: mutate_engine
          tags: [parser]
          http_status: 400
          grpc_code: InvalidArgument
          message: "Failed to parse mutation payload"
          severity: S3
          retryable: false

      INFRA:

        - code: CORE-INFRA-001
          key: JSON_SERIALIZATION_FAILED
          component: serializer
          tags: [infra]
          http_status: 500
          grpc_code: Internal
          message: "Failed to serialize request payload"
          severity: S2
          retryable: false

      SYS:

        - code: CORE-SYS-001
          key: INTERNAL_ERROR
          component: system
          tags: [system]
          http_status: 500
          grpc_code: Internal
          message: "Internal server error"
          severity: S1
          retryable: false

  # ==========================================================
  # IAM
  # ==========================================================

  iam:

    # ========================================================
    # AUTH
    # ========================================================

    auth:

      domain: "AUTH"

      errors:

        DOM:

          - code: AUTH-DOM-001
            key: LOGIN_EMAIL_REQUIRED
            component: validator
            tags: [domain]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Email is required"
            severity: S3
            retryable: false

          - code: AUTH-DOM-002
            key: LOGIN_EMAIL_INVALID
            component: validator
            tags: [domain]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Invalid email format"
            severity: S3
            retryable: false

          - code: AUTH-DOM-003
            key: LOGIN_PASSWORD_REQUIRED
            component: validator
            tags: [domain]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Password is required"
            severity: S3
            retryable: false

        TRANS:

          - code: AUTH-TRANS-001
            key: LOGIN_PAYLOAD_INVALID
            component: auth_transport
            tags: [transport]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Invalid login payload"
            severity: S3
            retryable: false

        SEC:

          - code: AUTH-SEC-001
            key: TOKEN_EXPIRED
            component: jwt
            tags: [security]
            http_status: 401
            grpc_code: Unauthenticated
            message: "Token expired"
            severity: S3
            retryable: false

          - code: AUTH-SEC-002
            key: UNAUTHORIZED
            component: auth_service
            tags: [security]
            http_status: 401
            grpc_code: Unauthenticated
            message: "Authentication required"
            severity: S3
            retryable: false

          - code: AUTH-SEC-003
            key: JWT_INVALID
            component: jwt
            tags: [security]
            http_status: 401
            grpc_code: Unauthenticated
            message: "Invalid token"
            severity: S3
            retryable: false

          - code: AUTH-SEC-004
            key: JWT_PAYLOAD_INVALID
            component: jwt
            tags: [security]
            http_status: 401
            grpc_code: Unauthenticated
            message: "Invalid token payload"
            severity: S3
            retryable: false

    # ========================================================
    # AUTHZ
    # ========================================================

    authz:

      domain: "AUTHZ"

      errors:

        DOM:

          - code: AUTHZ-DOM-001
            key: ROLE_NOT_FOUND
            component: role_domain
            tags: [domain]
            http_status: 404
            grpc_code: NotFound
            message: "Role not found"
            severity: S3
            retryable: false

          - code: AUTHZ-DOM-002
            key: ROLE_INVALID
            component: role_domain
            tags: [domain]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Role contains invalid references"
            severity: S3
            retryable: false

        APP:

          - code: AUTHZ-APP-001
            key: ROLE_ALREADY_EXISTS
            component: role_usecase
            tags: [application]
            http_status: 409
            grpc_code: AlreadyExists
            message: "Role already exists"
            severity: S3
            retryable: false

        TRANS:

          - code: AUTHZ-TRANS-001
            key: AUTHORIZATION_INVALID
            component: authz_transport
            tags: [transport]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Invalid authorization"
            severity: S3
            retryable: false

          - code: AUTHZ-TRANS-002
            key: RESOURCE_OR_ACTION_REQUIRED
            component: authz_transport
            tags: [transport]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Resource and action are required"
            severity: S3
            retryable: false

          - code: AUTHZ-TRANS-003
            key: ROLE_REQUIRED
            component: authz_transport
            tags: [transport]
            http_status: 400
            grpc_code: InvalidArgument
            message: "Role is required"
            severity: S3
            retryable: false

        SEC:

          - code: AUTHZ-SEC-001
            key: ROLE_FORBIDDEN
            component: authz_service
            tags: [security]
            http_status: 403
            grpc_code: PermissionDenied
            message: "Permission denied"
            severity: S3
            retryable: false

  # ==========================================================
  # PLATFORM
  # ==========================================================

  platform:

    domain: "PLATFORM"

    errors:

      INFRA:

        - code: PLATFORM-INFRA-001
          key: DB_TIMEOUT
          component: postgres
          tags: [infra, database]
          http_status: 503
          grpc_code: Unavailable
          message: "Database timeout"
          severity: S1
          retryable: true

        - code: PLATFORM-INFRA-002
          key: DB_QUERY_FAILED
          component: postgres
          tags: [infra, database]
          http_status: 500
          grpc_code: Internal
          message: "Database query failed"
          severity: S2
          retryable: false

        - code: PLATFORM-INFRA-003
          key: REDIS_UNAVAILABLE
          component: redis
          tags: [infra, cache]
          http_status: 503
          grpc_code: Unavailable
          message: "Redis unavailable"
          severity: S1
          retryable: true

        - code: PLATFORM-INFRA-004
          key: EXTERNAL_SERVICE_UNAVAILABLE
          component: external_service
          tags: [infra, external]
          http_status: 503
          grpc_code: Unavailable
          message: "External service unavailable"
          severity: S1
          retryable: true

        - code: PLATFORM-INFRA-005
          key: POSTGRES_UNAVAILABLE
          component: postgres
          tags: [infra, database]
          http_status: 503
          grpc_code: Unavailable
          message: "Postgres unavailable"
          severity: S1
          retryable: true

        - code: PLATFORM-INFRA-006
          key: CACHE_SERIALIZATION_FAILED
          component: cache
          tags: [infra, cache]
          http_status: 500
          grpc_code: Internal
          message: "Failed to serialize cache payload"
          severity: S2
          retryable: false

        - code: PLATFORM-INFRA-007
          key: CACHE_DESERIALIZATION_FAILED
          component: cache
          tags: [infra, cache]
          http_status: 500
          grpc_code: Internal
          message: "Failed to deserialize cache payload"
          severity: S2
          retryable: false

        - code: PLATFORM-INFRA-008
          key: CACHE_OPERATION_FAILED
          component: cache
          tags: [infra, cache]
          http_status: 500
          grpc_code: Internal
          message: "Cache operation failed"
          severity: S2
          retryable: false

# ============================================================
# ERROR DETAILS
# ============================================================

error_details:

  DOM:

    - code: VAL_REQUIRED
      message: "Field is required"

    - code: VAL_NULL
      message: "Field must not be null"

    - code: VAL_INVALID_FORMAT
      message: "Invalid format"

    - code: VAL_INVALID_TYPE
      message: "Invalid data type"

    - code: VAL_INVALID_ENUM
      message: "Invalid enum value"

    - code: VAL_OUT_OF_RANGE
      message: "Out of range"

    - code: VAL_TOO_SHORT
      message: "Value is too short"

    - code: VAL_TOO_LONG
      message: "Value is too long"

    - code: VAL_MIN
      message: "Value is below minimum"

    - code: VAL_MAX
      message: "Value exceeds maximum"

    - code: VAL_INVALID_PATTERN
      message: "Value does not match required pattern"

  APP:

    - code: APP_DUPLICATE
      message: "Duplicate value"

    - code: APP_CONFLICT
      message: "Value conflicts with existing data"

    - code: APP_NOT_ALLOWED
      message: "Operation not allowed"

    - code: APP_FORBIDDEN_STATE
      message: "Invalid state for operation"

    - code: APP_NOT_FOUND
      message: "Not found"

    - code: APP_ALREADY_EXISTS
      message: "Already exists"

    - code: APP_DEPENDENCY_MISSING
      message: "Required dependency is missing"

  PARSE:

    - code: PARSE_INVALID_REFERENCE
      message: "Invalid reference"

    - code: PARSE_INVALID_TIME_RANGE
      message: "Invalid time range"

  SEC:

    - code: SEC_UNSAFE_INPUT
      message: "Unsafe input detected"

    - code: SEC_INVALID
      message: "Invalid value"

# ============================================================
# DEFAULTS
# ============================================================

defaults:

  UNKNOWN_DOMAIN:

    code: CORE-DOM-999
    http_status: 400
    grpc_code: InvalidArgument
    message: "Unknown domain error"

  INTERNAL_FALLBACK:

    code: CORE-SYS-999
    http_status: 500
    grpc_code: Internal
    message: "Internal server error"